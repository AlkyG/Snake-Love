<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio Neon pro Meu Amor 🐍💜</title>
    <style>
        /* Fundo Cyberpunk */
        body {
            background-color: #0d0214;
            background-image: radial-gradient(#250938 20%, #0d0214 80%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: #fff;
            touch-action: none; /* Crucial para travar o scroll do celular e usar o tato no jogo */
        }

        h2 {
            text-shadow: 0 0 10px #bc13fe, 0 0 20px #bc13fe;
            color: #fff;
            margin: 0 0 15px 0;
            font-size: 22px;
            text-align: center;
        }

        /* Área do Jogo */
        #gameCanvas {
            border: 4px solid #bc13fe;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.7);
            border-radius: 10px;
            background-color: rgba(20, 5, 35, 0.8);
            backdrop-filter: blur(5px);
        }

        /* Pontuação Neon */
        #pontuacao {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
            color: #ff007f;
            text-shadow: 0 0 10px #ff007f;
        }

        /* Painel de Reiniciar */
        #painel-fim {
            display: none;
            position: absolute;
            background: rgba(13, 2, 20, 0.9);
            border: 2px solid #ff007f;
            box-shadow: 0 0 15px #ff007f;
            padding: 30px;
            border-radius: 16px;
            text-align: center;
            z-index: 20;
        }

        #mensagem-fim {
            font-size: 24px;
            color: #fff;
            text-shadow: 0 0 10px #ff007f;
            margin-bottom: 20px;
        }

        button {
            background: linear-gradient(45deg, #ff007f, #bc13fe);
            color: white;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 15px #bc13fe;
        }
    </style>
</head>
<body>

    <h2 id="titulo">Guie a cobrinha pro meu coração... ❤️🐍</h2>
    
    <canvas id="gameCanvas" width="320" height="320"></canvas>
    
    <div id="pontuacao">Corações coletados: 0</div>

    <div id="painel-fim">
        <div id="mensagem-fim"></div>
        <button onclick="reiniciarJogo()">Jogar de Novo? 💜</button>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const pontuacaoElemento = document.getElementById("pontuacao");
        const painelFim = document.getElementById("painel-fim");
        const mensagemFim = document.getElementById("mensagem-fim");

        // Configurações do Jogo
        const TAMANHO_QUADRADO = 20; // Tamanho de cada bloco da cobra/comida
        const LARGURA_GRID = canvas.width / TAMANHO_QUADRADO;
        const ALTURA_GRID = canvas.height / TAMANHO_QUADRADO;
        
        let cobra = [];
        let comida = {};
        let velocidadeX = 1;
        let velocidadeY = 0;
        let pontuacao = 0;
        let gameOve = false;
        let intervaloJogo;
        let velocidadeMilisegundos = 150; // Começa devagar

        // Sons (opcional, mas adicionei os gatilhos se você quiser colocar depois)
        // const somComer = new Audio('https://.../som.mp3');

        // MUDAR AS MENSAGENS DE FIM AQUI:
        const mensagensVitoria = [
            "Você é fera! Mas eu sou mais fera ainda em te amar. 😍💜",
            "Nível 'Super Dengo' desbloqueado! Te amo! ✨⚡",
            "Nossa, que precisão! Imagina esse foco me dando carinho? 🔮❤️"
        ];

        function iniciarJogo() {
            // Posição inicial da cobra (centro)
            cobra = [
                {x: 8, y: 8},
                {x: 7, y: 8},
                {x: 6, y: 8}
            ];
            velocidadeX = 1;
            velocidadeY = 0;
            pontuacao = 0;
            gameOver = false;
            velocidadeMilisegundos = 150;
            pontuacaoElemento.innerHTML = "Corações coletados: 0";
            painelFim.style.display = "none";
            document.getElementById('titulo').innerHTML = "Guie a cobrinha pro meu coração... ❤️🐍";
            
            criarComida();
            clearInterval(intervaloJogo);
            intervaloJogo = setInterval(loopJogo, velocidadeMilisegundos);
        }

        function loopJogo() {
            if (gameOver) return;
            atualizar();
            desenhar();
        }

        function atualizar() {
            // Move a cabeça
            const cabeca = {x: cobra[0].x + velocidadeX, y: cobra[0].y + velocidadeY};
            
            // Colisão com as bordas (tela infinita/wrap)
            if (cabeca.x < 0) cabeca.x = LARGURA_GRID - 1;
            if (cabeca.x >= LARGURA_GRID) cabeca.x = 0;
            if (cabeca.y < 0) cabeca.y = ALTURA_GRID - 1;
            if (cabeca.y >= ALTURA_GRID) cabeca.y = 0;

            // Colisão com o próprio corpo
            for (let i = 1; i < cobra.length; i++) {
                if (cobra[i].x === cabeca.x && cobra[i].y === cabeca.y) {
                    fimDeJogo();
                    return;
                }
            }

            // Adiciona a nova cabeça
            cobra.unshift(cabeca);

            // Verifica se comeu a comida
            if (cabeca.x === comida.x && cabeca.y === comida.y) {
                pontuacao++;
                pontuacaoElemento.innerHTML = "Corações coletados: " + pontuacao;
                // somComer.play(); // Descomente se tiver som
                criarComida();
                
                // Aumenta a velocidade a cada 3 pontos
                if (pontuacao % 3 === 0 && velocidadeMilisegundos > 60) {
                    velocidadeMilisegundos -= 15;
                    clearInterval(intervaloJogo);
                    intervaloJogo = setInterval(loopJogo, velocidadeMilisegundos);
                }
            } else {
                // Remove a cauda se não comeu (movimento normal)
                cobra.pop();
            }
        }

        function desenhar() {
            // Limpa o canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Desenha a Comida (Coração Neon)
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#ff007f";
            ctx.fillStyle = "#ff007f";
            ctx.font = "20px Arial";
            ctx.fillText("❤️", comida.x * TAMANHO_QUADRADO, comida.y * TAMANHO_QUADRADO + 18);

            // Desenha a Cobra (Roxa Neon)
            ctx.shadowBlur = 10;
            ctx.shadowColor = "#bc13fe";
            ctx.fillStyle = "#bc13fe";
            
            cobra.forEach((segmento, index) => {
                // Cabeça é ligeiramente diferente
                if (index === 0) {
                    ctx.fillStyle = "#fff"; // Cabeça branca brilhante
                    ctx.shadowBlur = 15;
                } else {
                    ctx.fillStyle = "#bc13fe";
                    ctx.shadowBlur = 10;
                }
                
                // Desenha o quadrado com cantos arredondados
                desenharQuadradoArredondado(ctx, segmento.x * TAMANHO_QUADRADO + 1, segmento.y * TAMANHO_QUADRADO + 1, TAMANHO_QUADRADO - 2, TAMANHO_QUADRADO - 2, 5);
            });
            ctx.shadowBlur = 0; // Reseta o shadow
        }

        function criarComida() {
            let novaPosicao;
            let colisao;
            
            do {
                colisao = false;
                novaPosicao = {
                    x: Math.floor(Math.random() * LARGURA_GRID),
                    y: Math.floor(Math.random() * ALTURA_GRID)
                };
                
                // Garante que a comida não apareça em cima da cobra
                cobra.forEach(segmento => {
                    if (segmento.x === novaPosicao.x && segmento.y === novaPosicao.y) {
                        colisao = true;
                    }
                });
            } while (colisao);
            
            comida = novaPosicao;
        }

        function fimDeJogo() {
            gameOver = true;
            clearInterval(intervaloJogo);
            
            painelFim.style.display = "block";
            
            // Escolhe uma mensagem fofa aleatória
            const mensagemAleatoria = mensagensVitoria[Math.floor(Math.random() * mensagensVitoria.length)];
            mensagemFim.innerHTML = "Game Over!<br>Pontuação: " + pontuacao + "<br><br>" + mensagemAleatoria;
            document.getElementById('titulo').innerHTML = "Opa, colidimos! 😅💜";
        }

        function reiniciarJogo() {
            iniciarJogo();
        }

        // Função auxiliar para desenhar cantos arredondados
        function desenharQuadradoArredondado(ctx, x, y, width, height, radius) {
            ctx.beginPath();
            ctx.moveTo(x + radius, y);
            ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
            ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
            ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y);
            ctx.closePath();
            ctx.fill();
        }

        // --- CONTROLES DE TATO (SWIPE) ---
        let toqueXInicial = null;
        let toqueYInicial = null;

        document.addEventListener('touchstart', function(e) {
            toqueXInicial = e.touches[0].clientX;
            toqueYInicial = e.touches[0].clientY;
        }, false);

        document.addEventListener('touchmove', function(e) {
            if (!toqueXInicial || !toqueYInicial || gameOver) return;

            let toqueXFinal = e.touches[0].clientX;
            let toqueYFinal = e.touches[0].clientY;

            let difX = toqueXInicial - toqueXFinal;
            let difY = toqueYInicial - toqueYFinal;

            // Verifica qual movimento foi maior (horizontal ou vertical)
            if (Math.abs(difX) > Math.abs(difY)) {
                // Movimento Horizontal
                if (difX > 0 && velocidadeX !== 1) { // Swipe Esquerda
                    velocidadeX = -1;
                    velocidadeY = 0;
                } else if (difX < 0 && velocidadeX !== -1) { // Swipe Direita
                    velocidadeX = 1;
                    velocidadeY = 0;
                }
            } else {
                // Movimento Vertical
                if (difY > 0 && velocidadeY !== 1) { // Swipe Cima
                    velocidadeX = 0;
                    velocidadeY = -1;
                } else if (difY < 0 && velocidadeY !== -1) { // Swipe Baixo
                    velocidadeX = 0;
                    velocidadeY = 1;
                }
            }

            // Reseta as posições para o próximo movimento
            toqueXInicial = null;
            toqueYInicial = null;
            
            // Impede o scroll da página enquanto joga
            e.preventDefault();
        }, { passive: false }); //passive: false é necessário para e.preventDefault() funcionar

        // Inicia o jogo ao carregar
        iniciarJogo();
    </script>
</body>
</html>
